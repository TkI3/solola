<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solola — Achetez, Vendez, Échangez à Kinshasa</title>
  <meta name="description" content="La marketplace entre particuliers à Kinshasa." />

  <link rel="stylesheet" href="../css/accueil.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
</head>

<body>

<section class="presentation">

  <div class="bande-de-coter"></div>

  <div class="conteneur">

    <!--barre de navigation-->
    <header class="navigation">
      <div class="logo">
        <img src="../assets/logo-clasique.png" alt="SOLOLA" />
        <span>SOLOLA</span>
      </div>
      <nav class="nav-links">
        <a href="html/accueil.html" class="active">Accueil</a>
        <a href="hmtl/main.html">Annonces</a>
        <a href="html/depot.html">Catégories</a>
        <a href="html/Connexion.html">Connexion</a>
        <a href="html/apropos.html">À propos</a>
      </nav>
      <div class="nav-icons">
        <div class="avatar"><i class="fas fa-user"></i></div>
      </div>
    </header>
    <!--barre de navigation-->

    <!-- presentation -->
    <div class="contenue-grid">
      <div class="contenue-text">
        <h1>Tala,<br>Pona,<br>Solola !</h1>
        <p class="lead">Entre particuliers à Kinshasa.</p>

        <div class="search">
          <input type="text" placeholder="Rechercher un produit, une catégorie, une ville..." />
          <button><i class="fas fa-search"></i></button>
        </div>

        <div class="cta-row" >
          <button class="btn-dark" onclick="window.location.href='depot.html'"><span class="plus"><i class="fas fa-plus"></i></span>Déposer une annonce</button>
          <button class="btn-outline" onclick="window.location.href='main.html'"><i class="fas fa-th"></i>Parcourir les annonces</button>
        </div>

        <div class="features" style="margin-top: 50px;">
          <div><i class="fas fa-users"></i><div><b>100%</b><span>Entre particuliers</span></div></div>
          <div><i class="fas fa-shield"></i><div><b>Simple</b><span>Sûr et fiable</span></div></div>
          <div><i class="fas fa-map-pin"></i><div><b>Local</b><span>Près de chez vous</span></div></div>
        </div>
      </div>

      <div class="contenue-illstr">
        <img src="../assets/Illu-Shop.png" alt="" />
      </div>
    </div>
    <!-- presentation -->
  </div>
</section>

<script src="../js/accueil.js"></script>
</body>
</html>
