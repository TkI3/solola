<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="main.css">
    <title>Solola-Articles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

</head>

<body>

    <header style="position: sticky; top: 0; z-index: 100;">

    <nav id="NavBar">

        <div class="logo-sur-barre">
            <img id="logos" src="assets/logo-text-classique.png" alt="SOLOLA" />  
        </div>

        <div class="search">
            <input type="text" placeholder="Rechercher un produit, une catégorie, une ville..." />
            <button ><i class="fas fa-search"></i></button>
        </div>

        <div id="cnt-icon" style="display:flex;align-items:center;gap: 10px; display:none">
            <button class="badge"><i class="fas fa-user"></i></button>
            <button class="badge"><i class="fas fa-bell"></i></button>
            <button class="badge"><i class="fas fa-heart"></i></button>
        </div>

        <button class="btn-dark"><span class="plus"><i class="fas fa-plus"></i></span>Déposer une annonce</button>
        <button class="btn-dark" id="login"><i class="fas fa-user"></i>Se connecter</button>


    </nav>

    <nav class="filter-bar">
        
        <select id="select">
            <option value="parLocalisation">Localisation</option>
            <option value="parClassique">prix</option>
        </select>

        
            <div class="categorieDfiltre" id="parLocalisation">
                <button class="filter active">Nioso</button>
                <button class="filter">Gombe</button>
                <button class="filter">Kamalondo</button>
                <button class="filter">Katindo</button>
                <button class="filter">Ibanda</button>
                <button class="filter">Nzanza</button>
                <button class="filter">Kasa-Vubu</button>
                <button class="filter">Kenya</button>
                <button class="filter">Virunga</button>
                <button class="filter">Kadutu</button>
                <button class="filter">Mvuzi</button>
            </div>

            <div class="categorieDfiltre" id="parClassique" style="display: none;"> 
                <button class="filter">Nioso</button>
                <button class="filter">450 Fc</button>
            </div>


    </nav>

    </header>

    
    <div id="produits"></div>

    <script src="main.js"></script>
</body>
</html>
