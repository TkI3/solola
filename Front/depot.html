<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="depot.css">
    <link rel="stylesheet" href="style.css">
    <title>Solola-Depot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

</head>

<body>
    
    <a href="/accueil.html" class="btn_return" ><i class="fas fa-arrow-left"></i></a>

     <div class="cnt">

        <div class="deco">
            <i class="fa-solid fa-bullhorn" id="icon_sheet"></i>
            <h1>Deposer une annonce <br><i style="font-weight: normal;color: grey;font-size: small;"> Maloba na yo nde ezo pesa talo</i> </h1>
           
        </div>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <label>Titre de l'annonce</label>
            <input type="text" name="titre" placeholder="Titre" required >

            <label>Prix (Fc)</label>
            <input type="number" name="prix" placeholder="Prix en Fc " id="prix" required>

            <select id="categorie" name="categorie" required>
                <option value="">catégorie</option>
                <option value="vetement">Elamba (Vêtements)</option>
                <option value="animaux">Niama (Animaux)</option>
                <option value="telephone">Telephone (Téléphone)</option>
                <option value="appareils">Appareils</option>
                <option value="chaussures">Chaussures</option>
            </select>

            <label>Localisation</label>
           
            <select id="district" name="district" required>
                <option value="">District</option>
                <option value="Lukunga">Lukunga</option>
                <option value="Funa">Funa</option>
                <option value="Mont-Amba">Mont-Amba</option>
                <option value="Tshangu">Tshangu</option>
            </select>


            <select id="commune" name="commune" required>
                <option value="">Commune</option>
                <option value="Bandalungwa">Bandalungwa</option>
                <option value="Barumbu">Barumbu</option>
                <option value="Bumbu">Bumbu</option>
                <option value="Gombe">Gombe</option>
                <option value="Kalamu">Kalamu</option>
                <option value="Kasa-Vubu">Kasa-Vubu</option>
                <option value="Kimbanseke">Kimbanseke</option>
                <option value="Kinshasa">Kinshasa</option>
                <option value="Kintambo">Kintambo</option>
                <option value="Kisenso">Kisenso</option>
                <option value="Lemba">Lemba</option>
                <option value="Limete">Limete</option>
                <option value="Lingwala">Lingwala</option>
                <option value="Makala">Makala</option>
                <option value="Maluku">Maluku</option>
                <option value="Masina">Masina</option>
                <option value="Matete">Matete</option>
                <option value="Mont-Ngafula">Mont-Ngafula</option>
                <option value="Ndjili">Ndjili</option>
                <option value="Ngaba">Ngaba</option>
                <option value="Ngaliema">Ngaliema</option>
                <option value="Ngiri-Ngiri">Ngiri-Ngiri</option>
                <option value="Nsele">Nsele</option>
                <option value="Selembao">Selembao</option>
            </select>

            <textarea id="description" name="description" placeholder="Décris l'état, l'année, les défauts, etc."></textarea>

            <input id="File_1" name="images" type="file" accept="image/*" required multiple style="display : none">

            <button type="submit" class="btn_submit"> Enregistrer l'annonce <i class="fas fa-arrow-right"></i></button>        

        </form>

        
    </div>

    <div class="cnt" id="love">

        <h2>Importer une Image</h2>

        <div class="image-card">
        
        <div class="main-preview" id="mainPreview" tabindex="0" role="button" aria-label="Cliquer pour ajouter des images">
          <div class="placeholder" id="mainPlaceholder">
            <i class="fa-solid fa-image" style="font-size:36px"></i>
            <div style="margin-top:8px;font-weight:600">Ajouter des photos</div>
            <div style="font-size:12px">Cliquez ici ou glissez-déposez (max 6)</div>
          </div>
        </div>

        
        <div class="thumbs" id="thumbsContainer"></div>
      </div>

        
    </div>

    <script src="depot.js"></script>
</body>
</html>
